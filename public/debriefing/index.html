<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<title>KCL 디브리핑</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

:root{
  --bg:#000;--panel:#111;--card:#181818;--text:#fff;--border:#2b2b2b;
  --gold:#d9d9d9;--gold-lt:#fff;--green:#fff;
  --text-2:#d7d7d7;--text-3:#9a9a9a;--surface:#0b0b0b;
  --safe-top:env(safe-area-inset-top, 0px);
  --safe-bot:env(safe-area-inset-bottom, 0px);
  --safe-left:env(safe-area-inset-left, 0px);
  --safe-right:env(safe-area-inset-right, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
*{font-family:'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', sans-serif;word-break:keep-all}
html{height:100%;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', sans-serif;
  font-size:16px;
  min-height:100vh;
  min-height:-webkit-fill-available;
  min-height:100dvh;
  overscroll-behavior-y:none;
}

.panel{
  display:none;
  padding:20px;
  padding-top:max(20px, var(--safe-top));
  padding-bottom:max(20px, var(--safe-bot));
  padding-left:max(20px, var(--safe-left));
  padding-right:max(20px, var(--safe-right));
  max-width:560px;margin:0 auto
}
.panel.active{display:block}
h2{text-align:center;font-size:22px;font-weight:700;margin-bottom:8px}
.subtitle{text-align:center;color:#666;font-size:14px;margin-bottom:28px}

input,select{
  width:100%;padding:14px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:8px;color:var(--text);
  font-size:16px;line-height:1.4;
  margin-bottom:14px;outline:none;
  -webkit-appearance:none;-moz-appearance:none;appearance:none;
  font-family:'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', sans-serif
}
select{
  background-image:linear-gradient(45deg,transparent 50%,#999 50%),linear-gradient(135deg,#999 50%,transparent 50%);
  background-position:calc(100% - 18px) 50%, calc(100% - 13px) 50%;
  background-size:5px 5px, 5px 5px;
  background-repeat:no-repeat;
  padding-right:36px;
}
input:focus,select:focus{border-color:#555}
input[type=tel],input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button,
input[type=tel]::-webkit-outer-spin-button,
input[type=tel]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

.btn{width:100%;padding:16px;background:#fff;color:#000;border:none;border-radius:8px;
  font-weight:700;font-size:16px;cursor:pointer;margin-bottom:12px;
  min-height:50px;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.btn:active{opacity:.8;transform:scale(.98)}
.btn:disabled{background:#555;color:#999;cursor:not-allowed}
.btn-outline{width:100%;padding:16px;background:transparent;color:var(--text);
  border:2px solid var(--border);border-radius:8px;font-weight:600;
  font-size:15px;cursor:pointer;margin-bottom:12px;
  min-height:48px;touch-action:manipulation}
.btn-outline:active{opacity:.7;transform:scale(.98)}
.btn-danger{width:100%;padding:14px;background:transparent;color:#ff4444;
  border:2px solid #ff4444;border-radius:8px;font-weight:600;
  cursor:pointer;margin-bottom:12px;min-height:44px;touch-action:manipulation}

.divider{border:none;border-top:2px solid #222;margin:20px 0}
.section-label{font-size:11px;color:#666;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}

/* 대회 로고 - 블랙/화이트 통일 */
.hero-logo-wrap{display:flex;align-items:center;justify-content:center;margin:18px auto 14px;min-height:112px}
.hero-logo-wrap:empty{display:none;min-height:0;margin:0}
.hero-logo{display:block;width:174px;height:124px;object-fit:contain;opacity:.98}
.result-logo-wrap{display:flex;align-items:center;justify-content:center;margin-bottom:12px;min-height:86px}
.result-logo{display:block;width:150px;height:106px;object-fit:contain;opacity:.98}
.kcl-login-mark{width:min(340px,86vw);margin:42px auto 24px;padding:24px 22px;border:1px solid #3a3a3a;border-radius:10px;background:#050505;text-align:center;box-shadow:0 22px 60px rgba(0,0,0,.32)}
.kcl-login-logo{display:block;width:min(258px,74vw);height:auto;margin:0 auto;overflow:visible}

/* Typography balance */
button,input,select,textarea{font-family:'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', sans-serif;letter-spacing:-0.02em}
h2,.subtitle,.section-label,.result-name,.result-affil,.result-comp,.round-title,.judge-name,.score-item-label,.score-item-val,.comment-label,.comment-text,.avg-title,.avg-sub,.avg-item-label,.avg-item-val{
  word-break:keep-all;overflow-wrap:normal;line-break:strict;
}
.score-grid{grid-template-columns:repeat(auto-fit,minmax(148px,1fr))}
.score-item-label{line-height:1.35}

@media (min-width:720px){.hero-logo{width:188px;height:134px}.result-logo{width:162px;height:114px}}


/* Global navigation */
.global-nav-buttons{
  position:fixed;z-index:900;top:max(12px,var(--safe-top));left:max(12px,var(--safe-left));
  display:inline-flex;align-items:center;gap:8px;
}
.global-nav-btn{
  display:inline-flex;align-items:center;gap:6px;min-height:38px;padding:0 14px;
  border:1px solid rgba(255,255,255,.24);border-radius:999px;
  background:rgba(18,18,18,.72);color:#fff;text-decoration:none;
  font-size:13px;font-weight:800;letter-spacing:-.02em;backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,.26);cursor:pointer;
}
.global-nav-btn:active{transform:scale(.97);opacity:.82}
.global-nav-btn .home-dot{width:6px;height:6px;border-radius:50%;background:#fff;opacity:.9}
@media print{.global-nav-buttons{display:none!important}}
@media (max-width:520px){.global-nav-buttons{top:max(10px,var(--safe-top));left:max(10px,var(--safe-left));gap:6px}.global-nav-btn{min-height:34px;padding:0 12px;font-size:12px}}

/* OTP */
.otp-info{background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:14px;margin-bottom:14px;font-size:14px;color:#999;line-height:1.6;text-align:center}
.otp-timer{text-align:center;font-size:13px;color:#666;margin-bottom:14px}
.otp-timer.warn{color:#ff9800}
.otp-timer.expired{color:#ff4444}

/* Result */
.result-header{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;text-align:center;box-shadow:0 18px 50px rgba(0,0,0,.28)}
.result-name{font-size:24px;font-weight:700;margin-bottom:4px}
.result-affil{font-size:14px;color:#999}
.result-comp{display:inline-block;border:1px solid #555;color:#fff;
  padding:5px 14px;border-radius:999px;font-size:12px;font-weight:800;margin-top:10px;letter-spacing:.04em;text-transform:uppercase;background:#050505}

.round-section{margin-bottom:20px}
.round-title{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.round-badge{display:inline-block;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:700}
.badge-예선{background:#fff;color:#000}
.badge-결선{background:linear-gradient(135deg,var(--gold),var(--gold-lt));color:#000}

.score-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.score-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.score-card-meta{margin:-6px 0 12px;color:#aaa;font-size:12px;font-weight:700}
.judge-name{font-size:15px;font-weight:700}
.total-score{font-size:28px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums}

.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.score-item{background:var(--surface);border:1px solid #252525;border-radius:8px;padding:10px 12px}
.score-item-label{font-size:11px;color:#888;margin-bottom:5px;font-weight:700;letter-spacing:.01em}
.score-item-val{font-size:18px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums}
.score-item-sub{font-size:11px;color:#999;margin-top:2px}

.comment-box{background:var(--panel);border-left:3px solid #fff;
  border-radius:0 8px 8px 0;padding:12px 14px;margin-top:10px}
.smart-tag-box{margin-top:10px;border:1px solid #dedede;border-radius:7px;background:#fafafa;padding:10px 12px}
.smart-tag-title{font-size:11px;font-weight:800;color:#555;margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px}
.smart-tag-row{display:flex;gap:8px;align-items:flex-start;border-top:1px solid #ececec;padding-top:7px;margin-top:7px}
.smart-tag-row:first-of-type{border-top:0;padding-top:0;margin-top:0}
.smart-tag-label{min-width:92px;font-size:11px;font-weight:800;color:#222}
.smart-tag-chips{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.smart-tag-chip{border:1px solid #cfcfcf;background:#fff;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:700;color:#111}
.comment-label{font-size:11px;color:#8e8e8e;font-weight:800;margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.comment-text{font-size:14px;color:#ddd;line-height:1.7}

.avg-box{background:#101010;border:1px solid #3a3a3a;border-radius:10px;padding:16px;margin-bottom:20px}
.avg-title{font-size:12px;color:#aaa;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.avg-total{text-align:center;font-size:42px;font-weight:800;color:#fff;margin-bottom:4px;font-variant-numeric:tabular-nums}
.avg-sub{text-align:center;font-size:13px;color:#999;margin-bottom:14px}
.avg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.avg-item{background:#080808;border:1px solid #252525;border-radius:8px;padding:10px 6px;text-align:center}
.avg-item-label{font-size:11px;color:#999;margin-bottom:4px}
.avg-item-val{font-size:16px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums}
.rank-box{background:#080808;border:1px solid #333;border-radius:10px;padding:14px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rank-box .cell{background:#111;border:1px solid #282828;border-radius:8px;padding:10px;text-align:center}
.rank-box small{display:block;color:#888;font-size:11px;font-weight:800;margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase}
.rank-box b{font-size:22px;color:#fff;font-variant-numeric:tabular-nums}
.tie-rule{grid-column:1/-1;text-align:center;color:#999;font-size:12px;line-height:1.5}

.toast{position:fixed;
  bottom:calc(28px + var(--safe-bot));
  left:50%;transform:translateX(-50%) translateY(80px);
  background:#fff;color:#000;padding:14px 24px;border-radius:8px;font-weight:600;
  font-size:14px;z-index:10000;opacity:0;transition:all .3s;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:#ff4444;color:#fff}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;
  height:100vh;height:-webkit-fill-available;height:100dvh;
  background:rgba(0,0,0,.8);z-index:9999;align-items:center;justify-content:center}
.overlay.active{display:flex}
.spinner{border:4px solid #333;border-top:4px solid #fff;border-radius:50%;
  width:48px;height:48px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.no-score{text-align:center;padding:30px 0;color:#555;font-size:14px}


/* PDF / Print 품질 고도화 */
.pdf-note{margin:10px 0 14px;color:#8d8d8d;font-size:12px;line-height:1.55;text-align:center}
@media print{
  @page{size:A4;margin:12mm}
  html,body{background:#fff!important;color:#111!important;min-height:auto!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body *{visibility:hidden!important}
  #pResult,#pResult *{visibility:visible!important}
  #pResult{display:block!important;position:absolute!important;left:0!important;top:0!important;width:100%!important;max-width:none!important;padding:0!important;margin:0!important;background:#fff!important;color:#111!important}
  #btn-pdf,.btn,.btn-outline,.btn-danger,#toast,#overlay{display:none!important;visibility:hidden!important}
  .result-header,.rank-box,.avg-box,.score-card,.comment-box{background:#fff!important;color:#111!important;border-color:#d7d7d7!important;box-shadow:none!important;break-inside:avoid;page-break-inside:avoid}
  .round-section{break-inside:auto;page-break-inside:auto;margin-bottom:9mm!important}
  .score-card{margin-bottom:6mm!important;padding:5mm!important;border-radius:8px!important}
  .score-card-header{border-bottom:1px solid #eee!important;padding-bottom:3mm!important;margin-bottom:4mm!important}
  .result-name,.total-score,.score-item-val,.avg-total,.rank-box b{color:#111!important}
  .result-affil,.result-comp,.score-item-label,.comment-label,.avg-title,.avg-sub,.tie-rule{color:#555!important}
  .result-comp{border-color:#999!important;background:#fff!important;color:#111!important}
  .round-badge{border:1px solid #111!important;background:#111!important;color:#fff!important}
  .score-grid{grid-template-columns:repeat(3,1fr)!important;gap:3mm!important}
  .score-item,.avg-item,.rank-box .cell{background:#fafafa!important;border-color:#ddd!important;color:#111!important;break-inside:avoid;page-break-inside:avoid}
  .comment-box{border-left:4px solid #111!important;background:#fafafa!important}
  .comment-text{color:#222!important;font-size:11pt!important;line-height:1.65!important}
  .panel{max-width:none!important}
  .result-logo-wrap{min-height:0!important;margin-bottom:4mm!important}
  .result-logo{max-width:34mm!important;max-height:24mm!important;filter:grayscale(1)!important}
}

/* 태블릿 */
@media (min-width:720px){
  .panel{max-width:720px}
  .score-grid{grid-template-columns:repeat(3,1fr)}
  .avg-grid{grid-template-columns:repeat(6,1fr)}
}


/* ─────────────────────────────────────────
   FINAL COMPETITION POLISH v1.0.2
   - 선수 공개용 디브리핑/PDF 전용 정돈
   - 검수완료·수정완료 데이터만 공식 결과로 표시
───────────────────────────────────────── */
.report-label{display:inline-flex;align-items:center;justify-content:center;margin:0 auto 14px;padding:6px 12px;border:1px solid rgba(255,255,255,.22);border-radius:999px;color:#cfcfcf;font-size:10px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;background:rgba(255,255,255,.04)}
.result-header{position:relative;overflow:hidden;padding:30px 24px 26px;border-radius:18px;background:linear-gradient(180deg,#161616 0%,#0c0c0c 100%);border:1px solid rgba(255,255,255,.12);box-shadow:0 28px 70px rgba(0,0,0,.35)}
.result-header:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(255,255,255,.10),transparent 44%);pointer-events:none}
.result-header>*{position:relative;z-index:1}
.result-logo-wrap{margin:0 auto 12px;min-height:78px}.result-logo{width:132px;height:88px;object-fit:contain;opacity:.96;filter:drop-shadow(0 6px 18px rgba(0,0,0,.32))}
.result-name{font-size:26px;font-weight:900;letter-spacing:-.04em}.result-affil{margin-top:5px;color:#aaa;font-size:13px}.result-comp{margin-top:14px;padding:7px 16px;border-color:rgba(255,255,255,.28);font-size:11px;background:#000;color:#fff}
.report-intro{display:grid;gap:8px;margin:12px 0 16px;padding:14px 16px;border:1px solid rgba(255,255,255,.13);border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.025));color:#cfcfcf;font-size:12px;line-height:1.55;word-break:keep-all}.report-intro b{color:#fff}.report-intro .intro-title{font-size:13px;color:#fff;font-weight:900;letter-spacing:-.02em}.report-intro .intro-text{color:#aaa}
.rank-box{grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0 18px;padding:14px;border-radius:16px;background:linear-gradient(180deg,#131313,#080808);border-color:rgba(255,255,255,.14)}.rank-box .cell{border-radius:12px;padding:14px 10px;background:#0f0f0f;border-color:rgba(255,255,255,.13)}.rank-box small{color:#9a9a9a}.rank-box b{font-size:26px;font-weight:950}.tie-rule{padding:6px 4px 0;color:#8f8f8f}
.round-section{margin-bottom:24px}.round-title{margin:18px 0 12px}.round-badge{padding:6px 15px;font-size:12px;border:1px solid rgba(255,255,255,.22)}.badge-예선{background:#fff;color:#000}.badge-결선{background:#fff;color:#000}
.score-card{border-radius:16px;padding:18px;background:linear-gradient(180deg,#151515 0%,#0d0d0d 100%);border:1px solid rgba(255,255,255,.14);box-shadow:0 18px 48px rgba(0,0,0,.22)}.score-card-header{padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid rgba(255,255,255,.10)}.judge-name{font-size:14px;font-weight:950;letter-spacing:-.02em}.reviewed-pill{display:inline-flex;align-items:center;margin-left:8px;padding:4px 8px;border-radius:999px;background:#fff;color:#000;font-size:10px;font-weight:950;vertical-align:middle;letter-spacing:-.02em}.total-score{font-size:30px;font-weight:950;letter-spacing:-.04em}
.score-grid{gap:10px}.score-item{border-radius:12px;padding:13px 14px;background:#101010;border:1px solid rgba(255,255,255,.11)}.score-item-label{color:#a0a0a0;font-size:11px;font-weight:850}.score-item-val{font-size:20px;font-weight:950;letter-spacing:-.03em}.score-item-sub{color:#969696;font-weight:700}
.smart-tag-box{margin-top:12px;border-radius:12px;background:#111;border:1px solid rgba(255,255,255,.12);padding:12px}.smart-tag-title{color:#aaa;font-size:10px;letter-spacing:.08em}.smart-tag-row{border-top-color:rgba(255,255,255,.08)}.smart-tag-label{color:#e6e6e6}.smart-tag-chip{border-color:rgba(255,255,255,.18);background:#1a1a1a;color:#e8e8e8;font-weight:800}
.comment-box{margin-top:14px;border:1px solid rgba(255,255,255,.12);border-left:4px solid #fff;border-radius:12px;background:#111;padding:15px 16px}.comment-label{color:#aaa}.comment-text{font-size:14.5px;line-height:1.78;color:#e7e7e7;word-break:keep-all;overflow-wrap:anywhere}.no-score{border:1px solid rgba(255,255,255,.12);border-radius:16px;background:#101010;color:#aaa;line-height:1.6}

@media print{
  @page{size:A4;margin:10mm 11mm}
  html,body{background:#fff!important;color:#111!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body *{visibility:hidden!important}#pResult,#pResult *{visibility:visible!important}
  #pResult{position:absolute!important;left:0!important;top:0!important;width:100%!important;max-width:none!important;padding:0!important;margin:0!important;background:#fff!important;color:#111!important}.btn,.btn-outline,.btn-danger,#btn-pdf,#pdf-note,.divider,#toast,#overlay{display:none!important;visibility:hidden!important}
  .result-header{background:#fff!important;color:#111!important;border:1.2px solid #111!important;border-radius:10px!important;box-shadow:none!important;padding:13mm 10mm 11mm!important;margin:0 0 6mm!important}.result-header:before{display:none!important}.report-label{background:#111!important;border-color:#111!important;color:#fff!important;margin-bottom:7mm!important;padding:1.8mm 4mm!important;font-size:8pt!important}.result-logo-wrap{min-height:13mm!important;margin-bottom:4mm!important}.result-logo{width:30mm!important;height:18mm!important;object-fit:contain!important;opacity:.82!important;filter:invert(1) grayscale(1) contrast(1.45)!important}.result-name{font-size:18pt!important;color:#111!important}.result-affil{font-size:9.5pt!important;color:#555!important}.result-comp{background:#fff!important;color:#111!important;border:1px solid #111!important;padding:1.8mm 5mm!important;font-size:8pt!important}

  <p class="subtitle">문자로 발송된 6자리 번호를 입력하세요</p>
  <div class="otp-info" id="otp-info"></div>
  <div class="otp-timer" id="otp-timer"></div>
  <input type="tel" id="inp-otp" placeholder="인증번호 6자리" maxlength="6" inputmode="numeric"
    autocomplete="one-time-code"
    oninput="this.value=this.value.replace(/[^0-9]/g,'')"
    onkeydown="if(event.key==='Enter')doVerifyOTP()">
  <button class="btn" id="btn-verify" onclick="doVerifyOTP()">확인</button>
  <button class="btn-outline" onclick="backToStep1()">다시 요청</button>
</div>

<!-- PANEL 3: 결과 -->
<div id="pResult" class="panel">
  <div class="result-header">
    <div class="report-label">OFFICIAL DEBRIEFING REPORT</div>
    <div id="result-logo" class="result-logo-wrap"></div>
    <div class="result-name" id="res-name"></div>
    <div class="result-affil" id="res-affil"></div>
    <div class="result-comp" id="res-comp"></div>
  </div>
  <div id="res-body"></div>
  <button class="btn" id="btn-pdf" style="display:none" onclick="downloadDebriefPdf()">PDF 저장 / 다운로드</button>
  <div class="pdf-note" id="pdf-note" style="display:none">인쇄 창에서 대상 또는 프린터를 <b>PDF로 저장</b>으로 선택하면 A4 디브리핑 PDF로 저장됩니다.</div>
  <div class="divider"></div>
  <button class="btn-outline" onclick="backToStep1()">처음으로</button>
</div>

<script>
var _name = '', _phone = '', _compCode = '', _maskedPhone = '';
var _lastResult = null;
var _timerInterval = null;
var _configs = [];

function debriefHomeTarget_() {
  return '/';
}
function clearDebriefSession_() {
  try {
    if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
    sessionStorage.removeItem('kcl_debrief_auth');
  } catch(e) {}
}
function goRootHome_() {
  clearDebriefSession_();
  window.location.href = debriefHomeTarget_();
  return false;
}
function goBackContext_() {
  var active = document.querySelector('.panel.active');
  var id = active ? active.id : '';
  if (id === 'pStep2') { showPanel('pStep1'); return false; }
  goRootHome_();
  return false;
}

// ─────────────────────────────────────────
// 대회 로고: 흰색/투명 배경 통일 버전
// ─────────────────────────────────────────
var COMP_LOGOS = {"KCAC":"/assets/logos/kcac.8fc71deb554e.png","KTCC":"/assets/logos/ktcc.c29d59851490.png","KBC":"/assets/logos/kbc.635a88067c9e.png","MOB":"/assets/logos/mob.e47166f20c3e.png","KCR":"/assets/logos/kcr.5cb74ccbba71.png","IKRC":"/assets/logos/ikrc.74e44d111296.png","MOC":"/assets/logos/moc.af6a6bf043f7.png"};
function logoImg_(code, className) {
  var src = COMP_LOGOS[String(code || '').toUpperCase()];
  if (!src) return '';
  var codeText = String(code || '').toUpperCase();
  return '<img class="' + (className || 'hero-logo') + ' logo-' + codeText + '" src="' + src + '" alt="' + codeText + ' logo">';
}
function updateDebriefLogo() {
  var code = document.getElementById('sel-comp').value;
  document.getElementById('debrief-logo').innerHTML = logoImg_(code, 'hero-logo');
  updateIdentityLabels_();
}

function updateIdentityLabels_() {
  var code = String(document.getElementById('sel-comp').value || '').toUpperCase();
  var label = document.getElementById('identity-label');
  var nameInput = document.getElementById('inp-name');
  var phoneInput = document.getElementById('inp-phone');
  if (code === 'KTCC') {
    if (label) label.textContent = '팀 확인';
    if (nameInput) {
      nameInput.placeholder = '팀명';
      nameInput.style.display = '';
      nameInput.setAttribute('autocomplete', 'off');
    }
    if (phoneInput) phoneInput.placeholder = '팀원 연락처 (둘 중 아무 번호 / 숫자만)';
  } else {
    if (label) label.textContent = '본인 확인';
    if (nameInput) {
      nameInput.placeholder = '이름';
      nameInput.style.display = '';
      nameInput.setAttribute('autocomplete', 'name');
    }
    if (phoneInput) phoneInput.placeholder = '연락처 (숫자만)';
  }
}


function hasGas_() {
  return (typeof google !== 'undefined' && google.script && google.script.run);
}
function gasRun_(fnName, args, onSuccess, onFailure) {
  if (!hasGas_()) {
    hideOverlay();
    toast('Cloudflare Pages 배포 주소에서 열어야 합니다. /debriefing/ 주소로 다시 접속해주세요.', true);
    if (typeof onFailure === 'function') onFailure(new Error('google.script.run is not available'));
    return;
  }
  var runner = google.script.run
    .withSuccessHandler(onSuccess || function(){})
    .withFailureHandler(onFailure || function(){ hideOverlay(); toast('서버 통신 중 오류가 발생했습니다', true); });
  runner[fnName].apply(runner, args || []);
}

window.onload = function() {
  showOverlay();
  gasRun_('getConfig', [], function(res) {
    hideOverlay();
    if (!res.success) { toast(res.message, true); return; }
    _configs = res.configs;
    var sel = document.getElementById('sel-comp');
    sel.onchange = updateDebriefLogo;
    res.configs.forEach(function(c) {
      if (!c.debriefing) return;
      var opt = document.createElement('option');
      opt.value = c.code;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });
    if (sel.options.length <= 1) {
      sel.innerHTML = '<option value="">현재 오픈된 디브리핑이 없습니다</option>';
    }
    updateDebriefLogo();
  }, function() {
    hideOverlay();
    toast('설정을 불러오지 못했습니다', true);
  });
};

function toast(msg, isErr) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.className='toast'; }, 3000);
}
function showOverlay() { document.getElementById('overlay').classList.add('active'); }
function hideOverlay() { document.getElementById('overlay').classList.remove('active'); }
function showPanel(id) {
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function doSendOTP() {
  var comp = document.getElementById('sel-comp').value;
  var name = document.getElementById('inp-name').value.trim();
  var phone = document.getElementById('inp-phone').value.replace(/[^0-9]/g,'');

  var isKtcc = String(comp || '').toUpperCase() === 'KTCC';
  if (!comp) { toast('대회를 선택해주세요', true); return; }
  if (!name) { toast(isKtcc ? '팀명을 입력해주세요' : '이름을 입력해주세요', true); return; }
  if (phone.length < 10 || phone.length > 11) { toast(isKtcc ? '팀원 연락처를 숫자만 정확히 입력해주세요' : '연락처를 숫자만 정확히 입력해주세요', true); return; }

  _name = name; _phone = phone; _compCode = comp;

  var btn = document.getElementById('btn-send-otp');
  btn.disabled = true;
  btn.textContent = '발송 중...';
  showOverlay();

  gasRun_('sendOTP', [_name, _phone, _compCode], function(res) {
    hideOverlay();
    btn.disabled = false;
    btn.textContent = '인증번호 받기';
    if (!res.success) { toast(res.message, true); return; }
    _maskedPhone = res.maskedPhone || '';
    showOTPPanel();
  }, function() {
    hideOverlay();
    btn.disabled = false;
    btn.textContent = '인증번호 받기';
    toast('발송 중 오류가 발생했습니다', true);
  });
}

function showOTPPanel() {
  document.getElementById('otp-info').textContent =
    (_maskedPhone ? _maskedPhone + ' 번호로 ' : '등록된 휴대폰 번호로 ') + '인증번호를 발송했습니다.';
  document.getElementById('inp-otp').value = '';
  document.getElementById('btn-verify').disabled = false;
  startTimer(300);
  showPanel('pStep2');
  setTimeout(function(){ document.getElementById('inp-otp').focus(); }, 300);
}

function startTimer(seconds) {
  clearInterval(_timerInterval);
  var remain = seconds;
  var timerEl = document.getElementById('otp-timer');
  var verifyBtn = document.getElementById('btn-verify');
  function tick() {
    if (remain <= 0) {
      clearInterval(_timerInterval);
      timerEl.textContent = '인증번호가 만료되었습니다. 다시 요청해주세요.';
      timerEl.className = 'otp-timer expired';
      verifyBtn.disabled = true;
      return;
    }
    var m = Math.floor(remain / 60);
    var s = remain % 60;
    timerEl.textContent = '유효시간 ' + m + ':' + (s < 10 ? '0' : '') + s;
    timerEl.className = 'otp-timer' + (remain <= 60 ? ' warn' : '');
    remain--;
  }
  tick();
  _timerInterval = setInterval(tick, 1000);
}

function doVerifyOTP() {
  var otp = document.getElementById('inp-otp').value.trim();
  if (!otp || otp.length < 6) { toast('인증번호 6자리를 입력해주세요', true); return; }
  showOverlay();
  gasRun_('verifyOTP', [_name, _phone, _compCode, otp], function(res) {
    hideOverlay();
    clearInterval(_timerInterval);
    if (!res.success) { toast(res.message, true); return; }
    renderResult(res);
    showPanel('pResult');
  }, function() {
    hideOverlay();
    toast('인증 중 오류가 발생했습니다', true);
  });
}

function fmtScore(v, digits) {
  var n = Number(v);
  if (isNaN(n)) return String(v == null ? '' : v);
  var d = digits == null ? 2 : digits;
  return (Math.round(n * 100 + 1e-8) / 100).toFixed(d).replace(/\.00$/, '').replace(/(\.\d)0$/, '$1');
}
function isSmartTagLabel(label) {
  return /Smart\s*Tags?|\bTags?\b|Tag\s*List|스마트\s*태그|스마트태그|태그/i.test(String(label || ''));
}
function isCommentLabel(label) {
  return /Comment|Comments|Memo|Feedback|Note|코멘트|메모|심사평|평가\s*코멘트|평가\s*의견|총평|종합\s*코멘트|종합\s*의견/i.test(String(label || ''));
}

function isOverallReportCommentLabel_(label) {
  return /Overall|General|종합|총평|전체\s*코멘트|전체\s*의견|평가\s*메모|평가\s*의견|심사평|메모/i.test(String(label || ''));
}
function normalizeKclLabelText(label) {
  return String(label || '')
    .replace(/블렌딩/g, '블렌딩')
    .replace(/애프터테이스트/g, '애프터테이스트')
    .replace(/스윗니스/g, '스윗니스')
    .replace(/Aftertaste\(([^)]*)\)/ig, 'Aftertaste(애프터테이스트)')
    .replace(/Sweetness\(([^)]*)\)/ig, 'Sweetness(스윗니스)')
    .replace(/Flavor\(([^)]*)\)/ig, 'Flavor(플레이버)');
}
function commentPublicLabel(label) {
  var s = String(label || '');
  if (isSmartTagLabel(s)) {
    if (/Service.*Professionalism|서비스의\s*전문성|Presentation.*Service/i.test(s)) return 'Service Professionalism Smart Tags(스마트태그)';
    if (/Espresso.*Taste.*Design/i.test(s)) return 'Espresso Taste & Design Smart Tags(스마트태그)';
    if (/Espresso.*Clean/i.test(s)) return 'Espresso Clean Cup Smart Tags(스마트태그)';
    if (/Espresso.*Mouth/i.test(s)) return 'Espresso Mouthfeel Smart Tags(스마트태그)';
    if (/Espresso.*Flavor/i.test(s)) return 'Espresso Flavor Smart Tags(스마트태그)';
    if (/Signature.*Taste.*Design/i.test(s)) return 'Signature Taste & Design Smart Tags(스마트태그)';
    if (/Signature.*Clean/i.test(s)) return 'Signature Clean Cup Smart Tags(스마트태그)';
    if (/Signature.*Mouth/i.test(s)) return 'Signature Mouthfeel Smart Tags(스마트태그)';
    if (/Signature.*Flavor/i.test(s)) return 'Signature Flavor Smart Tags(스마트태그)';
    if (/Machine.*Equipment/i.test(s)) return 'Machine & Equipment Smart Tags(스마트태그)';
    if (/Aftertaste/i.test(s)) return 'Aftertaste Smart Tags(애프터테이스트 태그)';
    if (/Sweetness/i.test(s)) return 'Sweetness Smart Tags(스윗니스 태그)';
    if (/Acidity/i.test(s)) return 'Acidity Smart Tags(산미 태그)';
    if (/Body/i.test(s)) return 'Body Smart Tags(바디 태그)';
    if (/Flavor/i.test(s)) return 'Flavor Smart Tags(플레이버 태그)';
  }
  if (isOverallReportCommentLabel_(s)) return 'Overall Comment(종합 코멘트)';
  if (/Aftertaste/i.test(s)) return 'Aftertaste Comment(애프터테이스트 코멘트)';
  if (/Sweetness/i.test(s)) return 'Sweetness Comment(스윗니스 코멘트)';
  if (/Acidity/i.test(s)) return 'Acidity Comment(산미 코멘트)';
  if (/Body/i.test(s)) return 'Body Comment(바디 코멘트)';
  if (/Flavor/i.test(s)) return 'Flavor Comment(플레이버 코멘트)';
  return normalizeKclLabelText(s);
}
function isCuppingAttributeLabel(label) {
  return /Flavor|Aftertaste|Acidity|Body|Sweetness|Overall|플레이버|애프터|에프터|피니시|산미|바디|스윗니스|단맛|오버롤|주관/i.test(String(label || ''));
}
function valueLooksNumericScore(value) {
  var s = String(value == null ? '' : value).trim();
  if (!s) return false;
  if (/^-?\d+(\.\d+)?$/.test(s)) return true;
  if (/^-?\d+(\.\d+)?\s*\/\s*\d+/.test(s)) return true;
  return false;
}
function scoreMaxForLabel(label, compCode) {
  label = String(label || '');
  compCode = String(compCode || '').toUpperCase();
  if (isSmartTagLabel(label)) return '';
  if (isCommentLabel(label)) return '';
  if (/총점|최종점수|총평가\s*반영|감점\s*전\s*합산|정답|가산|감점|시간|번호|리프수|패턴종류|Leaf|Pattern Type/.test(label)) return '';
  if (compCode === 'IKRC' && /Flavor|Aftertaste|Acidity|Body|Sweetness|Mouthfeel|Clean Cup|Aroma|Overall|플레이버|애프터|에프터|산미|바디|스윗니스|단맛|질감|클린|아로마|종합/i.test(label)) return 10;
  if (compCode === 'KCR' && /Flavor|Aftertaste|Acidity|Body|Sweetness|Mouthfeel|Clean Cup|Aroma|Overall|플레이버|애프터|에프터|산미|바디|스윗니스|단맛|질감|클린|아로마|종합/i.test(label)) return 5;
  if (/Flavor|Aftertaste|Acidity|Body|Sweetness|Mouthfeel|Clean Cup|Aroma|Overall|플레이버|애프터|에프터|산미|바디|스윗니스|단맛|질감|클린|아로마|종합|완성도|균형|품질|비율|선명도|표현|수행|청결|맛|프레젠|전문성|운용|Machine|Equipment|Taste.*Design|Balance|Tactile/i.test(label)) return 5;
  return '';
}
function scoreDisplay(label, value, compCode) {
  if (isSmartTagLabel(label)) return escHtml(value);
  var n = Number(value);
  if (isNaN(n)) return escHtml(value);
  var max = scoreMaxForLabel(label, compCode);
  return max ? ('<span>' + escHtml(fmtScore(n,2)) + '</span><span class="unit">/ ' + escHtml(max) + '</span>') : escHtml(fmtScore(n,2));
}
function scoreMeterHtml_(label, value, compCode) {
  var n = Number(value); var max = Number(scoreMaxForLabel(label, compCode));
  if (!isFinite(n) || !isFinite(max) || max <= 0) return '';
  var pct = Math.max(0, Math.min(100, (n / max) * 100));
  return '<div class="score-meter" aria-hidden="true"><span class="score-meter-fill" style="width:' + pct.toFixed(1) + '%"></span></div>';
}
function publicLabel(k) {
  if (isCommentLabel(k)) return commentPublicLabel(k);
  var c = String(k || '').replace(/\s/g,'');
  var map = [
    [/^테크니컬총점$|TechnicalTotal/i,'테크니컬 평가항목 점수'],
    [/^센서리총점$|SensoryTotal/i,'센서리 평가항목 점수'],
    [/^창작메뉴총점$|CreativeTotal/i,'창작메뉴 평가항목 점수'],
    [/^총평가반영점수$|OfficialTotal|FinalReflected/i,'총평가 반영점수'],
    [/^감점전합산$|SubtotalBeforePenalty/i,'감점 전 합산'],

    [/리프수감점|LeafPenalty/i,'리프 수 감점'],
    [/시간감점|TimePenalty/i,'시간 감점'],
    [/리프수|LeafCount/i,'리프 수'],
    [/종합코멘트|OverallComment|GeneralComment|Comment/i,'Overall Comment(종합 코멘트)'],
    [/DesignCompletion|디자인완성도/i,'Design Completion(디자인 완성도)'],
    [/Position.*Symmetry|위치.*대칭|대칭/i,'Position & Symmetry(위치와 대칭)'],
    [/PatternCompletion|패턴완성도/i,'Pattern Completion(패턴 완성도)'],
    [/PatternBalance|패턴균형|PatternSymmetry.*Balance|대칭.*균형/i,'Pattern Symmetry & Balance(대칭과 균형)'],
    [/SurfaceQuality|표면품질|표면/i,'Surface Quality(표면 품질)'],
    [/Position|Proportion|위치|비율/i,'Position & Proportion(위치와 비율)'],
    [/LineClarity|PatternDefinition|선명도/i,'Pattern Definition(패턴 선명도)'],
    [/ThemeExpression|주제표현/i,'Theme Expression(주제 표현력)'],
    [/Workflow|TechnicalExecution|작업수행/i,'Technical Execution(작업 수행 완성도)'],
    [/Cleanliness|청결/i,'Cleanliness(청결)'],
    [/Signature.*Taste.*Design|Signature.*맛.*설계/i,'Signature Taste & Design(맛과 설계) ×2'],

    [/Signature.*Flavor|Signature.*플레이버/i,'Signature Flavor(플레이버)'],

    [/Espresso.*CleanCup|Espresso.*클린컵/i,'Espresso Clean Cup(클린컵)'],
    [/Espresso.*Mouthfeel|Espresso.*마우스필|Espresso.*질감/i,'Espresso Mouthfeel(마우스필)'],
    [/Espresso.*Flavor|Espresso.*플레이버/i,'Espresso Flavor(플레이버)'],
    [/Machine.*Equipment|머신.*기물|기물.*운용/i,'Machine & Equipment Professionalism(머신 및 기물 운용 전문성)'],
    [/TasteBalance|맛.*균형|맛의균형/i,'Taste Balance(맛의 균형)'],
    [/Presentation|프레젠/i,'Presentation(프레젠테이션)'],
    [/FlavorAccuracy|플레이버일치/i,'Flavor Accuracy(플레이버 일치성)'],

function buildCommentBox(s, compCode) {

  Object.keys(s || {}).forEach(function(k){
    var raw = s[k];
    if (raw == null || String(raw).trim() === '') return;
    if (isSmartTagLabel(k)) return;
    var isComment = isCommentLabel(k);
    var isTextAttr = !isComment && isCuppingAttributeLabel(k) && !valueLooksNumericScore(raw);
    if (!isComment && !isTextAttr) return;
    var label = commentPublicLabel(k);
    // KCR/IKRC 선수 공개 리포트는 종합 코멘트 중심으로 정리한다.
    // 예전 데이터에서 개별 항목 코멘트 칸에 숫자가 들어간 경우가 있어 공개 화면에서는 숨긴다.
    if ((comp === 'KCR' || comp === 'IKRC') && !isOverallReportCommentLabel_(label)) return;
    var text = cleanupPublicCommentText_(label, raw, s, compCode);
    if (!text || /^(0|0\.0+|0\s*\/\s*\d+)$/i.test(text)) return;
    var key = label.replace(/\s/g,'').toLowerCase();
    if (rows.some(function(r){ return r.key === key; })) return;
    rows.push({ key:key, label: label, text: text });
  });
  if ((comp === 'KCR' || comp === 'IKRC') && !rows.some(function(r){ return isOverallReportCommentLabel_(r.label); })) {
    var generated = buildProfessionalOverallComment_(s, compCode);
    if (generated) rows.push({ key:'overallcomment', label:'Overall Comment(종합 코멘트)', text:generated });
  }
  if (!rows.length) return null;
  var box = document.createElement('div');
  box.className = 'comment-box';
  box.innerHTML = rows.map(function(r){
    return '<div class="comment-label">' + escHtml(r.label) + '</div><div class="comment-text">' + escHtml(r.text) + '</div>';
  }).join('');
  return box;
}

function displayJudgeLabel(name, role, fallback) {
  var n = String(name == null ? '' : name).trim();
  var r = String(role == null ? '' : role).trim();
  var compact = r.replace(/\s/g, '').toLowerCase();
  var label = '';
  if (/관리자|admin/.test(compact)) label = '관리자';
  else if (/운영|스텝|부팀장|staff|operator/.test(compact)) label = '운영진';
  else if (/팀장|teamlead|leader/.test(compact)) label = '팀장';
  else if (/헤드/.test(compact) || /head/.test(compact)) label = (/테크|기술|technical|tech/.test(compact) ? '테크니컬 헤드 심사위원' : '센서리 헤드 심사위원');
  else if (/테크|기술|technical|tech/.test(compact)) label = '테크니컬 심사위원';
  else if (/센서|감각|sensory|sensor|심사|judge/.test(compact)) label = '센서리 심사위원';
  else label = '심사위원';

  if (!n || n === '-' || n === '심사위원') return fallback || label;
  if (/심사위원|운영진|팀장|관리자/.test(n)) return n;
  return label + ' ' + n;
}


function mobPublicRoleFlags_(s) {

function mobPublicHeaderGroup_(h) {

  if (/시간감점|경기시간|시연시간|종료시간|Time\s*Penalty|Elapsed/i.test(h)) return 'time';
  if (/^테크니컬\s*총점$|^Technical\s*Total$/i.test(h)) return 'derivedTech';
  if (/^센서리\s*총점$|^Sensory\s*Total$/i.test(h)) return 'derivedSensory';
  if (/^창작메뉴\s*총점$|^Creative\s*Total$/i.test(h)) return 'derivedCreative';
  if (/^감점\s*전\s*합산$|^총평가\s*반영점수$/i.test(h)) return 'derivedOfficial';

  if (/Pre-Service\s*Station|Service\s*Station|Post-Service\s*Station|시연\s*전\s*작업대|시연\s*중\s*작업대|시연\s*후\s*작업대/i.test(h)) return 'tech';
  if (/Creative\s*Form|Creative\s*Flavor|Creative\s*Balance|Creative\s*Mouthfeel|Creative\s*Professionalism|창작\s*향미|전문성과\s*독창성|형태와\s*용이성/i.test(h)) return 'creative';
  if (/Sweetness|Flavor|Balance|Clean\s*Cup|Mouthfeel|Professionalism|스윗니스|플레이버|균형|클린컵|질감|시연\s*전문성/i.test(h)) return 'sensory';

function mobPublicHeaderAppliesToRole_(h, s) {
  var group = mobPublicHeaderGroup_(h);
  if (!group) return true;
  var flags = mobPublicRoleFlags_(s || {});
  var menu = String((s && (s['메뉴'] || s['Menu'] || s._col8)) || '브루잉');
  var creative = /창작|signature|creative/i.test(menu);
  if (!creative && (group === 'sigTech' || group === 'creative' || group === 'derivedCreative')) return false;
  if (flags.onlyTech) return group === 'tech' || group === 'sigTech' || group === 'time' || group === 'derivedTech' || group === 'derivedOfficial';
  if (flags.onlySens) return group === 'sensory' || group === 'creative' || group === 'derivedSensory' || group === 'derivedCreative' || group === 'derivedOfficial';

}

function isPublicScoreKey(k) {

  if (/번호|연락처|전화|휴대폰|제출시간|라운드|심사위원|팀|역할|모드|상태|검수|서명|프로세스|우유종류|우유명|우유제품|제품명|잔용도|컵용도|평가용도|가이드URL|패턴종류|리프수|Leaf|PatternType|주제|선택\s*컵|지정국가|농장|발효방식|평가구분/i.test(k)) return false;
  if (/코멘트|메모|Comment|총평|종합/i.test(k)) return false;
  return /점|총점|최종점수|감점|정답|가산|보너스|종료시간|경기시간|소요시간|OX|O\/X|Y\/N|완성도|균형|품질|비율|선명도|표현|수행|청결|맛|질감|프레젠|Flavor|Sweetness|Acidity|Body|Mouthfeel|Clean|Aroma|Overall|Balance|Tactile/i.test(k);

function buildGenericScoreGrid(s, compCode) {
  var grid = document.createElement('div');
  grid.className = 'score-grid';
  Object.keys(s || {}).forEach(function(k){
    if (String(compCode || '').toUpperCase() === 'MOB') {
      if (!mobPublicHeaderAppliesToRole_(k, s)) return;
      if (/^테크니컬\s*총점$|^센서리\s*총점$|^창작메뉴\s*총점$|^감점\s*전\s*합산$|^총평가\s*반영점수$|^시간감점$/i.test(String(k || ''))) return;
    }
    if (!isPublicScoreKey(k) || k === '총점' || k === '최종점수') return;
    var v = s[k];
    if (v == null || String(v) === '') return;
    var div = document.createElement('div');
    div.className = 'score-item';
    div.innerHTML = '<div class="score-item-label">' + escHtml(publicLabel(k)) + '</div><div class="score-item-val">' + scoreDisplay(k, v, compCode) + '</div>' + scoreMeterHtml_(k, v, compCode);
    grid.appendChild(div);

}
function firstFilledScoreValue(s, keys) {
  var zeroFallback = '';
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    if (s[k] == null || String(s[k]) === '') continue;
    var n = Number(s[k]);
    if (isNaN(n)) continue;
    if (zeroFallback === '') zeroFallback = s[k];
    if (Math.abs(n) > 1e-9) return s[k];
  }
  return zeroFallback;
}

function buildKcacCupMetaLine(s) {

  var milk = s['우유종류'] || s['사용우유'] || '';
  var product = s['우유명'] || s['우유제품'] || s['제품명'] || '';
  var patternType = s['패턴종류'] || s['Pattern Type'] || '';

  var milkText = milk ? milk + (product ? '(' + product + ')' : '') : product;
  var leafText = leafCount !== '' ? ('리프 ' + leafCount + '개') : '';
  return [purpose, milkText, patternType, leafText].filter(function(v){ return v != null && String(v).trim() !== ''; }).join(' · ');

function firstKcacVal_(s, keys) {

  ];
  var finalItems = [
    { label:'Theme Expression(주제 표현력)', val:firstKcacVal_(s, ['주제표현력','결선 Theme Expression(주제 표현력)']) },
    { label:'Technical Execution(작업 수행 완성도)', val:firstKcacVal_(s, ['작업수행완성도','작업수행','결선 Technical Execution(작업 수행 완성도)']) },
    { label:'Cleanliness(청결)', val:firstKcacVal_(s, ['청결','결선 Cleanliness(청결)']) },
    { label:'Taste Balance(맛의 균형)', val:firstKcacVal_(s, ['맛의균형','맛균형','결선 Taste Balance(맛의 균형)']) },
    { label:'Mouthfeel(질감)', val:firstKcacVal_(s, ['질감','결선 Mouthfeel(질감)']) },
    { label:'Presentation(프레젠테이션)', val:firstKcacVal_(s, ['프레젠테이션','결선 Presentation(프레젠테이션)']) },
    { label:'Surface Quality(표면 품질)', val:firstKcacVal_(s, ['표면품질','결선 Surface Quality(표면 품질)']) },
    { label:'Position & Symmetry(위치와 대칭)', val:firstKcacVal_(s, ['위치대칭','위치비율','결선 Position & Symmetry(위치와 대칭)']) },
    { label:'Design Completion(디자인 완성도)', val:firstKcacVal_(s, ['디자인완성도','패턴완성도','결선 Design Completion(디자인 완성도)']) }
  ];
  var items = (isFinale ? finalItems : qualItems).filter(function(item){
    return item.val !== undefined && item.val !== null && String(item.val).trim() !== '';
  });
  var grid = document.createElement('div');
  grid.className = 'score-grid';
  items.forEach(function(item) {
    var v = Number(item.val || 0);
    var div = document.createElement('div');
    div.className = 'score-item';
    div.innerHTML =
      '<div class="score-item-label">' + item.label + '</div>' +
      '<div class="score-item-val">' + scoreDisplay(item.label, v, compCode) + '</div>' + scoreMeterHtml_(item.label, v, compCode);
    grid.appendChild(div);
  });
  var timePenalty = Number(s['시간감점'] || 0);
  var leafPenalty = Number(s['리프수감점'] || 0);
  var penalty = Number(s['감점'] || 0);
  if (!penalty && (timePenalty || leafPenalty)) penalty = timePenalty >= 999 ? 999 : timePenalty + leafPenalty;
  var final_ = Number(s['최종점수'] || 0);
  if (!grid.children.length) return buildGenericScoreGrid(s, compCode);
  if (penalty > 0) {
    var penDiv = document.createElement('div');
    penDiv.style.cssText = 'margin-top:8px;font-size:13px;color:#ff9800;text-align:right';
    if (penalty >= 999) penDiv.textContent = '실격 처리 → 최종 ' + fmtScore(final_,2) + '점';
    else penDiv.textContent = '감점 -' + fmtScore(penalty,2) + '점' + (timePenalty || leafPenalty ? ' (시간 -' + fmtScore(timePenalty,0) + ' / 리프 -' + fmtScore(leafPenalty,0) + ')' : '') + ' → 최종 ' + fmtScore(final_,2) + '점';
    grid.appendChild(penDiv);
  }
  return grid;
}

function downloadBase64Pdf(res) {
  if (!res || !res.base64) { toast('PDF 데이터가 없습니다', true); return; }
  var binary = atob(res.base64);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  var blob = new Blob([bytes], { type: res.mimeType || 'application/pdf' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = res.fileName || 'KCL_debriefing.pdf';
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 1000);
}

function downloadDebriefPdf() {
  if (!_lastResult || !(_lastResult.scores || []).length) { toast('다운로드할 디브리핑 자료가 없습니다', true); return; }
  var info = _lastResult.playerInfo || {};
  var comp = String(_lastResult.competition || 'KCL');
  var name = String(info.teamName || info.name || 'Debriefing').replace(/[\\/:*?"<>|]/g, '_');
  var oldTitle = document.title;
  document.title = comp + '_' + name + '_Debriefing';
  toast('PDF 저장용 화면을 준비했습니다. 인쇄 창에서 PDF로 저장을 선택하세요.');
  setTimeout(function(){
    window.print();
    setTimeout(function(){ document.title = oldTitle; }, 800);
  }, 160);
}

function backToStep1() {
  clearInterval(_timerInterval);
  document.getElementById('inp-otp').value = '';
  showPanel('pStep1');
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

// iOS 키보드 가림 방지
document.addEventListener('focusin', function(e) {
  var t = e.target;
  if (!t || (t.tagName !== 'INPUT' && t.tagName !== 'SELECT' && t.tagName !== 'TEXTAREA')) return;
  setTimeout(function() {
    try { t.scrollIntoView({ block:'center', behavior:'smooth' }); } catch(e2) {}
  }, 320);
});

// iOS Safari 더블탭 줌 방지
var _lastTap = 0;
document.addEventListener('touchend', function(e) {
  var now = Date.now();
  if (now - _lastTap <= 350) {
    var t = e.target;
    if (!t || (t.tagName !== 'INPUT' && t.tagName !== 'SELECT' && t.tagName !== 'TEXTAREA')) {
      e.preventDefault();
    }
  }
  _lastTap = now;
}, { passive: false });
</script>
