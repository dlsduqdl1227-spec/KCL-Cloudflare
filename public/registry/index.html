<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>KCL Registry</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root{--bg:#050505;--panel:#111;--line:#2b2b2b;--text:#fff;--muted:#9a9a9a;--soft:#f5f5f5;--danger:#ff5a5a}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 10%,#1d1d1d,#050505 42%);color:var(--text);font-family:Pretendard,system-ui,-apple-system,sans-serif}button,input,select,textarea{font:inherit}
.wrap{width:min(1040px,calc(100% - 28px));margin:28px auto 60px}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:22px}.brand{font-size:30px;font-weight:900;letter-spacing:-.04em}.sub{color:var(--muted);line-height:1.55;margin-top:6px}.card{background:rgba(17,17,17,.86);border:1px solid var(--line);border-radius:22px;padding:20px;margin:14px 0;box-shadow:0 20px 80px rgba(0,0,0,.34)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.label{font-size:12px;color:#aaa;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin:0 0 8px}input,select,textarea{width:100%;background:#050505;color:#fff;border:1px solid #333;border-radius:14px;padding:13px 14px;outline:none}textarea{min-height:190px;line-height:1.45;resize:vertical;white-space:pre;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px}.btn{border:0;border-radius:14px;background:#fff;color:#000;padding:13px 16px;font-weight:900;cursor:pointer}.btn.secondary{background:#1e1e1e;color:#fff;border:1px solid #333}.btn.danger{background:#2a1111;color:#fff;border:1px solid #5a1f1f}.btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.pillrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.pill{border:1px solid #333;border-radius:999px;padding:8px 11px;font-size:12px;color:#ccc}.msg{margin-top:12px;color:#ddd;white-space:pre-line;line-height:1.55}.msg.err{color:var(--danger)}.table{width:100%;border-collapse:collapse;margin-top:12px;font-size:13px}.table th,.table td{border-bottom:1px solid #262626;text-align:left;padding:9px 7px;vertical-align:top}.table th{color:#aaa;font-size:11px}.hidden{display:none}.hint{color:#aaa;font-size:13px;line-height:1.55}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.status{font-size:13px;color:#bbb}.nav a{color:#fff;text-decoration:none;border:1px solid #333;border-radius:999px;padding:8px 12px;font-size:13px;background:#101010}.nav{display:flex;gap:8px;flex-wrap:wrap}.logo-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.logo-chip{font-size:12px;font-weight:900;border:1px solid #333;border-radius:999px;padding:8px 12px;background:#0b0b0b}
@media(max-width:780px){.grid,.grid3{grid-template-columns:1fr}.top{display:block}.brand{font-size:25px}.wrap{width:min(100% - 18px,1040px);margin-top:16px}.card{border-radius:18px;padding:16px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <div class="brand">KCL Registry</div>
      <div class="sub">선수·심사위원 등록, 블라인드 컵번호 매핑, 디브리핑 인증 정보를 D1에 저장합니다.</div>
      <div class="logo-strip"><span class="logo-chip">KBC</span><span class="logo-chip">KTCC</span><span class="logo-chip">MOC</span><span class="logo-chip">MOB</span><span class="logo-chip">KCR</span><span class="logo-chip">IKRC</span><span class="logo-chip">KCAC</span></div>
    </div>
    <div class="nav"><a href="/">Home</a><a href="/assessment/">Assessment</a><a href="/debriefing/">Debriefing</a></div>
  </div>

  <div class="card" id="loginCard">
    <div class="label">Admin Login</div>
    <div class="grid3">
      <input id="loginName" placeholder="관리자 이름" value="관리자">
      <input id="loginPhone" placeholder="연락처 숫자만" inputmode="numeric" value="01000000000" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      <button class="btn" onclick="login()">로그인</button>
    </div>
    <div class="msg" id="loginMsg"></div>
  </div>

  <div id="main" class="hidden">
    <div class="card">
      <div class="label">Competition</div>
      <div class="grid3">
        <select id="comp" onchange="loadParticipants()"></select>
        <button class="btn secondary" onclick="loadParticipants()">등록 목록 새로고침</button>
        <button class="btn danger" onclick="clearCompParticipants()">선택 대회 선수 초기화</button>
      </div>
      <div class="hint" style="margin-top:12px">블라인드 대회는 심사 전에 반드시 선수명·연락처와 컵번호/샘플번호/팀번호를 등록하세요. 디브리핑 인증은 이 매핑으로 점수를 찾습니다.</div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="label">Participants CSV</div>
        <textarea id="participantsCsv"></textarea>
        <div class="btnrow">
          <button class="btn" onclick="importParticipants()">선수 CSV 등록</button>
          <button class="btn secondary" onclick="fillParticipantTemplate()">예시 다시 넣기</button>
        </div>
        <div class="msg" id="partMsg"></div>
      </div>
      <div class="card">
        <div class="label">Judges / Operators CSV</div>
        <textarea id="operatorsCsv"></textarea>
        <div class="btnrow">
          <button class="btn" onclick="importOperators()">심사위원 CSV 등록</button>
          <button class="btn secondary" onclick="fillOperatorTemplate()">예시 다시 넣기</button>
        </div>
        <div class="msg" id="opMsg"></div>
      </div>
    </div>

    <div class="card">
      <div class="label">Manual Participant</div>
      <div class="grid3">
        <input id="mNo" placeholder="참가자/팀/컵 번호">
        <input id="mName" placeholder="선수명 또는 팀명">
        <input id="mPhone" placeholder="연락처" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        <input id="mAff" placeholder="소속">
        <input id="mCup" placeholder="컵번호/출품번호">
        <input id="mSample" placeholder="샘플번호">
      </div>
      <div class="btnrow"><button class="btn" onclick="saveOneParticipant()">개별 선수 저장</button></div>
      <div class="msg" id="manualMsg"></div>
    </div>

    <div class="card">
      <div class="label">Registered Participants</div>
      <div class="status" id="partCount"></div>
      <div style="overflow:auto"><table class="table" id="partTable"></table></div>
    </div>
  </div>
</div>
<script src="/assets/kcl-api-shim.js"></script>
<script>
var actor=null, configs=[], templates={};
function rpc(action,args,ok,fail){google.script.run.withSuccessHandler(ok||function(){}).withFailureHandler(fail||function(e){alert(e.message||e)} )[action].apply(null,args||[])}
function msg(id,text,isErr){var el=document.getElementById(id);el.textContent=text||'';el.className='msg'+(isErr?' err':'')}
function login(){msg('loginMsg','로그인 중...');rpc('judgeLogin',[document.getElementById('loginName').value,document.getElementById('loginPhone').value],function(res){if(!res.success){msg('loginMsg',res.message,true);return} if(res.accountType!=='ADMIN'&&res.type!=='ADMIN'&&res.access!=='ALL'){msg('loginMsg','관리자 권한이 필요합니다.',true);return} actor=res;document.getElementById('loginCard').classList.add('hidden');document.getElementById('main').classList.remove('hidden');loadRegistry();})}
function loadRegistry(){rpc('getRegistryData',['ALL',actor],function(res){if(!res.success){alert(res.message);return} configs=res.configs||[];templates=res.templates||{};var sel=document.getElementById('comp');sel.innerHTML=configs.map(function(c){return '<option value="'+c.code+'">'+c.code+' · '+c.name+'</option>'}).join('');fillParticipantTemplate();fillOperatorTemplate();loadParticipants();})}
function fillParticipantTemplate(){document.getElementById('participantsCsv').value=(templates.participants||'대회코드,참가자번호,선수명,소속,연락처,컵번호,샘플번호,팀번호,팀명,예선컵번호,본선컵번호,결선컵번호\n').trim()}
function fillOperatorTemplate(){document.getElementById('operatorsCsv').value=(templates.operators||'대회코드,계정유형,심사위원명,소속,연락처,역할,평가팀\n').trim()}
function importParticipants(){msg('partMsg','등록 중...');rpc('importParticipants',[{competitionCode:document.getElementById('comp').value,csv:document.getElementById('participantsCsv').value},actor],function(res){msg('partMsg',(res.message||'완료')+(res.errors&&res.errors.length?'\n'+res.errors.join('\n'):''),!res.success);loadParticipants();})}
function importOperators(){msg('opMsg','등록 중...');rpc('importOperators',[{competitionCode:document.getElementById('comp').value,csv:document.getElementById('operatorsCsv').value},actor],function(res){msg('opMsg',(res.message||'완료')+(res.errors&&res.errors.length?'\n'+res.errors.join('\n'):''),!res.success);})}
function saveOneParticipant(){var code=document.getElementById('comp').value;var no=document.getElementById('mNo').value;var payload={competitionCode:code,name:document.getElementById('mName').value,phone:document.getElementById('mPhone').value,affiliation:document.getElementById('mAff').value,uniqueNo:no,cupNo:document.getElementById('mCup').value,sampleNo:document.getElementById('mSample').value,teamNo:code==='KTCC'?no:'',teamName:code==='KTCC'?document.getElementById('mName').value:''};msg('manualMsg','저장 중...');rpc('upsertParticipant',[payload,actor],function(res){msg('manualMsg',res.message||'완료',!res.success);loadParticipants();})}
function loadParticipants(){if(!actor)return;var code=document.getElementById('comp').value||'ALL';rpc('listParticipants',[code,actor],function(res){var rows=res.participants||[];document.getElementById('partCount').textContent=code+' 등록 '+rows.length+'건';var html='<tr><th>ID</th><th>대회</th><th>번호</th><th>이름/팀</th><th>소속</th><th>연락처</th><th>컵/샘플/팀</th></tr>';html+=rows.map(function(r){return '<tr><td>'+r.rowIndex+'</td><td>'+r.competitionCode+'</td><td>'+esc(r.displayNo)+'</td><td>'+esc(r.name||r.teamName)+'</td><td>'+esc(r.affiliation)+'</td><td>'+esc(r.phone)+'</td><td class="mono">cup '+esc(r.cupNo)+' / sample '+esc(r.sampleNo)+' / team '+esc(r.teamNo)+'</td></tr>'}).join('');document.getElementById('partTable').innerHTML=html;})}
function clearCompParticipants(){var code=document.getElementById('comp').value;if(!confirm(code+' 선수 등록 데이터를 모두 삭제할까요? 점수 데이터는 삭제되지 않습니다.'))return;rpc('clearParticipants',[code,actor],function(res){alert(res.message||'완료');loadParticipants();})}
function esc(s){return String(s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}
</script>
</body>
</html>
