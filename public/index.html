<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>KCL Assessment v2</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    *{box-sizing:border-box;font-family:Pretendard,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif}
    body{margin:0;background:#000;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .wrap{width:min(720px,100%)}
    .mark{border:1px solid #333;background:#080808;border-radius:16px;padding:28px;margin-bottom:18px}
    h1{margin:0 0 8px;font-size:28px;letter-spacing:-.04em}.sub{color:#999;line-height:1.65;margin:0}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:18px}
    a{display:block;text-decoration:none;color:#000;background:#fff;border-radius:12px;padding:18px;font-weight:900;text-align:center}
    a.dark{color:#fff;background:#171717;border:1px solid #333}
    .note{margin-top:16px;color:#777;font-size:13px;line-height:1.6}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="mark">
      <h1>KCL Assessment v2</h1>
      <p class="sub">Cloudflare Pages + Functions + D1 기반 통합 웹앱입니다. 평가, 디브리핑, 카메라를 한 프로젝트에서 운영합니다.</p>
      <div class="grid">
        <a href="/assessment/">평가 / 관리자</a>
        <a href="/debriefing/" class="dark">디브리핑</a>
        <a href="/camera/" class="dark">KCAC 카메라</a>
      </div>
      <p class="note">처음 배포 후 관리자 계정을 D1 또는 환경변수로 등록한 뒤 평가 화면에서 로그인하세요.</p>
    </section>
  </main>
</body>
</html>
