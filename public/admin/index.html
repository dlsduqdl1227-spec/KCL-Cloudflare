<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>KCL Admin</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root{--bg:#050505;--panel:rgba(16,16,18,.88);--line:rgba(255,255,255,.14);--text:#fff;--muted:rgba(255,255,255,.62);--ok:#6ee7b7;--danger:#ff6b6b;--accent:#c98a52}
*{box-sizing:border-box;font-family:'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', sans-serif}html,body{margin:0;min-height:100%;background:#050505;color:#fff}body{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 18% 14%,rgba(201,138,82,.24),transparent 32%),radial-gradient(circle at 78% 86%,rgba(158,184,255,.14),transparent 30%),#050505}.wrap{width:min(860px,100%)}.panel{border:1px solid var(--line);border-radius:28px;background:var(--panel);box-shadow:0 30px 90px rgba(0,0,0,.45);padding:30px}.top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px}.badge{display:inline-flex;gap:8px;align-items:center;border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:8px 11px;color:var(--muted);font-size:12px;font-weight:900}.dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 18px var(--ok)}h1{margin:12px 0 8px;font-size:clamp(32px,6vw,56px);letter-spacing:-.07em;line-height:.98}.sub{margin:0;color:rgba(255,255,255,.72);line-height:1.65}.home{color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:10px 13px;font-size:13px;font-weight:900;background:rgba(255,255,255,.05)}.login{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;margin-top:20px}input{width:100%;border:1px solid rgba(255,255,255,.16);background:#050505;color:#fff;border-radius:15px;padding:15px;outline:none}button,.linkbtn{border:0;border-radius:15px;background:#fff;color:#000;padding:15px 18px;font-weight:950;cursor:pointer;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px}.msg{min-height:24px;margin-top:12px;color:#ddd;white-space:pre-line;line-height:1.5}.msg.err{color:var(--danger)}.msg.ok{color:var(--ok)}.hidden{display:none}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}.admin-card{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.055);border-radius:20px;padding:18px;text-decoration:none;color:#fff;min-height:134px;display:flex;flex-direction:column;justify-content:space-between;transition:.18s ease}.admin-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.085)}.admin-card strong{font-size:20px;letter-spacing:-.04em}.admin-card span{font-size:13px;line-height:1.5;color:rgba(255,255,255,.62)}.admin-card.primary{background:linear-gradient(135deg,rgba(201,138,82,.26),rgba(255,255,255,.06));border-color:rgba(201,138,82,.35)}.smsbox{margin-top:16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);border-radius:20px;padding:16px}.smsbox h3{margin:0 0 8px;font-size:16px}.smsrow{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:10px}.statusline{font-size:13px;color:rgba(255,255,255,.65);line-height:1.55;white-space:pre-line}.foot{margin-top:20px;color:rgba(255,255,255,.4);font-size:12px;line-height:1.6}@media(max-width:760px){body{display:block;padding:18px;padding-top:46px}.panel{padding:22px;border-radius:24px}.top{display:block}.home{display:inline-flex;margin-top:16px}.login{grid-template-columns:1fr}.cards{grid-template-columns:1fr}.smsrow{grid-template-columns:1fr}.admin-card{min-height:116px}}
</style>
</head>
<body>
<main class="wrap">
  <section class="panel">
    <div class="top">
      <div>
        <div class="badge"><i class="dot"></i>ADMIN CENTER</div>
        <h1>KCL Admin</h1>
        <p class="sub">관리자 또는 대회팀장 인증 후 담당 대회 등록 관리, 평가 관리, 디브리핑 확인 페이지로 이동합니다.</p>
      </div>
      <a class="home" href="/">Home</a>
    </div>

    <div id="loginBox">
      <div class="login">
        <input id="loginName" placeholder="관리자 이름" autocomplete="name">
        <input id="loginPhone" placeholder="연락처 숫자만" inputmode="numeric" autocomplete="tel" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        <button onclick="login()">관리자 로그인</button>
      </div>
      <div class="msg" id="msg"></div>
    </div>

    <div id="adminMain" class="hidden">
      <div class="msg ok" id="welcome"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
        <button type="button" onclick="logoutAdmin()" style="background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.18)">다시 로그인 / 권한 새로고침</button>
      </div>
      <div class="cards">
        <a class="admin-card primary" href="/registry/"><strong>등록 관리</strong><span>선수·팀·운영진·스텝·심사위원 엑셀 업로드 및 블라인드 번호 매핑</span></a>
        <a class="admin-card" href="/assessment/"><strong>평가 관리</strong><span>평가 입력, 검수/수정, 검수완료, 순위 확인</span></a>
        <a class="admin-card" href="/debriefing/"><strong>디브리핑</strong><span>선수 인증 및 상세 점수·코멘트 확인, PDF 저장</span></a>
      </div>
      <div class="smsbox">
        <h3>SMS / PDF 상태</h3>
        <div class="statusline" id="systemStatus">로그인 후 시스템 상태를 확인합니다.</div>
        <div class="smsrow">
          <input id="testPhone" placeholder="테스트 받을 번호" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
          <button onclick="sendTestSms()">SMS 테스트</button>
        </div>
      </div>
      <div class="foot">관리자 로그인 정보는 이 브라우저에 임시 저장되어 /registry/ 접속 시 자동으로 이어집니다.</div>
    </div>
  </section>
</main>
<script src="/assets/kcl-api-shim.js"></script>
<script>
function msg(text, type){var el=document.getElementById('msg');el.textContent=text||'';el.className='msg'+(type==='err'?' err':(type==='ok'?' ok':''));}
function saveActor(actor){try{localStorage.setItem('kclAdminActor', JSON.stringify(actor));}catch(e){}}
function isLegacyDefaultActor(actor){
  var n=String((actor&&(actor.name||actor.judgeName))||'').trim();
  var p=String((actor&&actor.phone)||'').replace(/[^0-9]/g,'');
  return n==='관리자' && p==='01000000000';
}
function clearSavedActor(){try{localStorage.removeItem('kclAdminActor');}catch(e){}}
function readActor(){
  try{
    var actor=JSON.parse(localStorage.getItem('kclAdminActor')||'null');
    if(isLegacyDefaultActor(actor)){ clearSavedActor(); return null; }
    return actor;
  }catch(e){return null;}
}
function showAdmin(actor){document.getElementById('loginBox').classList.add('hidden');document.getElementById('adminMain').classList.remove('hidden');var isAll=actor&&actor.access==='ALL';var access=isAll?' · 전체 관리자':(actor.access?' · 담당대회 '+actor.access:'');var kind=String((actor&&(actor.accountType||actor.type))||'').toUpperCase();document.getElementById('welcome').textContent=(actor.name||actor.judgeName||'관리자')+'님, 관리자 페이지에 접속했습니다'+access+(kind==='ADMIN'?'':'')+'.';loadSystemStatus(actor);}
function loadSystemStatus(actor){var el=document.getElementById('systemStatus'); if(!el)return; el.textContent='상태 확인 중...'; google.script.run.withSuccessHandler(function(res){if(!res||!res.success){el.textContent=(res&&res.message)||'상태 확인 실패';return;} el.textContent='버전: '+(res.version||'-')+'\nPDF: '+(res.pdfMode==='browser-print'?'브라우저 PDF 저장':'-')+'\nSMS: '+(res.smsProvider||'dev')+(res.smsReady?' / 실발송 준비 완료':' / 환경변수 확인 필요')+(res.smsFromMasked?' / 발신번호 '+res.smsFromMasked:'');}).withFailureHandler(function(e){el.textContent=e.message||String(e);}).getSystemStatus(actor);}
function sendTestSms(){var actor=readActor();var phone=document.getElementById('testPhone').value;var el=document.getElementById('systemStatus');if(!actor){msg('관리자 로그인 후 이용해주세요.','err');return;} if(!phone){msg('테스트 받을 번호를 입력해주세요.','err');return;} el.textContent='SMS 테스트 발송 중...'; google.script.run.withSuccessHandler(function(res){if(!res||!res.success){el.textContent=(res&&res.message)||'SMS 테스트 실패';return;} el.textContent=(res.message||'테스트 문자 발송 완료')+'\nprovider: '+(res.provider||'-');}).withFailureHandler(function(e){el.textContent=e.message||String(e);}).sendTestSMS(phone, actor);}
function isAdmin(res){var t=String((res&&(res.accountType||res.type))||'').toUpperCase();return res && (t==='ADMIN'||t==='TEAMLEAD'||res.access==='ALL'||res.competitionCode==='ALL'||/팀장|관리자/.test(res.role||''));}
function logoutAdmin(){clearSavedActor();document.getElementById('adminMain').classList.add('hidden');document.getElementById('loginBox').classList.remove('hidden');msg('저장된 권한을 지웠습니다. 같은 이름/연락처로 다시 로그인해주세요.','ok');}
function login(){
  msg('로그인 중...');
  var name=document.getElementById('loginName').value.trim();
  var phone=document.getElementById('loginPhone').value.replace(/[^0-9]/g,'');
  if(name==='관리자' && phone==='01000000000'){
    clearSavedActor();
    msg('기본 관리자 계정은 비활성화되었습니다. 새로 등록한 관리자 계정으로 로그인해주세요.','err');
    return;
  }
  google.script.run.withSuccessHandler(function(res){if(!res||!res.success){msg((res&&res.message)||'로그인 실패','err');return;} if(!isAdmin(res)){msg('관리자 또는 대회팀장 권한이 필요합니다.','err');return;} saveActor(res);showAdmin(res);}).withFailureHandler(function(e){msg(e.message||String(e),'err');}).judgeLogin(name,phone);
}
var existing=readActor();if(existing&&isAdmin(existing)) showAdmin(existing);
</script>
</body>
</html>
