<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KCL Admin</title>
  <style>
    body { margin: 0; font-family: Arial, "Noto Sans KR", sans-serif; background: #f7f7f8; color: #15171a; }
    main { max-width: 760px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 24px; margin: 0 0 12px; }
    p { line-height: 1.6; }
    .panel { border: 1px solid #d9dde3; background: #fff; border-radius: 8px; padding: 18px; margin-top: 18px; }
    .status { font-family: Consolas, monospace; white-space: pre-wrap; background: #111827; color: #e5e7eb; padding: 14px; border-radius: 6px; }
    button { border: 1px solid #111827; background: #111827; color: #fff; border-radius: 6px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <main>
    <h1>KCL 관리자</h1>
    <p>현재 데이터 관리는 Google Sheet에서 진행합니다. 이 화면은 Cloudflare와 Google Apps Script 연결 상태만 확인합니다.</p>
    <div class="panel">
      <button id="ping">GAS 연결 확인</button>
      <div id="status" class="status" style="margin-top:14px">대기 중</div>
    </div>
  </main>
  <script>
    document.getElementById('ping').onclick = function() {
      var status = document.getElementById('status');
      status.textContent = '확인 중...';
      fetch('/api/gas')
        .then(function(res) { return res.json(); })
        .then(function(data) { status.textContent = JSON.stringify(data, null, 2); })
        .catch(function(err) { status.textContent = String(err && err.message ? err.message : err); });
    };
  </script>
</body>
</html>
